front:
  text: 易數鈎隱圖卷上
  hash: sha256:28763d3fb0eeac8bb6c430f230d0f72751ece0030d31fc4ef77954b5cd33aff2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0160_HFL_001-001a, image: hfl/0071/0071-006.png}
body:
  text: 太極第一太極無數與象今以二儀之氣混而為一以畫之蓋欲明二儀所從而生也太極生兩儀第二經曰易有太極是生兩儀太極者一氣也天地未分之前元氣混而為一一氣所判是曰兩儀易不云乎天地而云兩儀者何也蓋以兩儀則二氣始分天地則形象斯著以其始分兩體之儀故謂之兩儀也何以明其然略試論之夫氣之上者輕清氣之下者重濁輕清而圓者天之象也重濁而方者地之象也茲乃上下未交之時但分其儀象耳若二氣交則天一下而生水地二上而生火此則形之始也五行既備而生動植為所謂在天成象在地成形也則知兩儀乃天地之象天地乃兩儀之體爾今畫天左旋者取天一天三之位也畫地右動者取地二地四之位也分而各其處者蓋明上下未交之象也天五第三天一地二天三地四此四象生數也至于天五則居中而主乎變化不知何物也強名曰中和之氣不知所以然而然也交接乎天地之氣成就乎五行之質彌綸錯綜無所不周三才之道既備退藏於密寂然無事茲所謂隂陽不測之謂神者也經雖云四象生八卦然須三五之變易備七八九六之成數而後能生八卦而定位矣天地數十有五第四或問曰天地之數何以由天五而生變化答曰天地之生數足所以生變化也天地之數十有五自天一至天五凡十五數也天一天三天五成九此陽之數也故乾元用九地二地四成六此隂之數也故坤元用六兼五行之成數四十合而為五十有五備天地之極數也所以能成變化而行鬼神天一下生地六第五地二上生天七第六天三左生地八第七地四右生天九第八經曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象義曰叄合也伍為偶配也為天五合配天一下生地六之類是也以通其變化交錯而成四象八卦之數也成天地之文者為隂陽交而著其文理也極其數者為極天地之數也天地之極數五十有五之謂也遂定天地之象者天地之數既設則象從而定也兩儀生四象第九經曰兩儀生四象孔氏疏謂金木水火禀天地而有故云兩儀生四象土則分王四季又地中之别惟云四象也且金木水火有形之物安得為象哉孔氏失之逺矣又云易有四象所以示者莊氏云四象謂六十四卦之中有實象有假象有義象有用象也今於釋卦之處巳破之矣何氏謂天生神物聖人則之一也天地變化聖人效之二也天垂象見吉凶三也河出圖洛出書聖人則之四也今謂此四事聖人易外别有其功非專易內之物稱易有四象且又云易有四象所以示也繫辭焉所以告也然則象與辭相對之物辭既爻卦之下辭象謂爻卦之象也上兩儀生四象七八尢六之謂也諸儒有謂七八九六今則從以為義也且疏家以七八九六之四象為所以示之四象則駁雜之甚也何哉夫七八九六乃少隂少陽老隂老陽之位生八卦之四象非易之所以示四象也略試論之且夫四象者其義有二一者謂兩儀所生之四象二者謂易有四象所以示之四象若天一地二天三地四所以兼天五之變化上下交易四象備其成數而後能生八卦矣於是乎坎離震兊居四象之正位不云五象者以五無定位舉其四則五可知矣夫五上駕天一而下生地六下駕地二而上生天七古駕天三而左生地八左駕地四而右生天九此河圖四十有五之數耳斯則二儀所生之四象所謂易有四象所以示者若繫辭云吉凶者失得之象一也悔吝者憂虞之象二也變化者進退之象三也剛柔者畫夜之象四也且孔氏疏云象之與辭相對之物辭既文卦之下辭象謂爻卦之象也又上句云易有四象所以示也下句云繫辭焉所以告也詳其吉凶悔吝變化剛柔四者之象既繫辭所陳則與爻卦正協其義也而又孔氏復引二儀所生之四象舉七八九六之數則其義非也不亦失之甚乎四象生八卦第十五行成數者水數六金數九火數七木數八也水居坎而生乾金居兊而生坤火居離而生巽木居震而生艮巳居四正而生乾坤艮巽共成八卦也二儀得十成變化第十一此乃五行生成數本屬洛書此畫之者欲備天地五十五數也天數第十二地數第十三天地之數第十四內十五天地之用九六之數也兼五行之數四十合而為五十有五備天地之數也大衍之數第十五經曰凡天地之數五十有五此所以成變化而行鬼神也又曰大衍之數五十則減天地之數五也韓氏曰演天地之數所賴者五十也則不言減五之數所以孔氏疏以為五十有五乃天地隂陽竒偶之數非是文演天地之䇿也且諸儒分大衍之數分而為二之義中則述天地之數五十有五之用末則陳四營成易十有八變而成卦之理此豈可同乎本末而異其中之數也況乎揲蓍之數以象天地豈可捨其數而求其象乎斯亦疏家之失不求天五退藏於密之義也且夫五十有五天地之極數也大衍之數天地之用數也蓋由天五不用所以大衍之數少天地之數五也或曰天五不用何以明其不用之由答曰天五不用非不用也是用四象者也且天一地二天三地四此四象生數也天五所以斡四象生數而成七九六八之四象是四象之中皆有五也則知五能包四象四象皆五之用也舉其四則五在其中矣故易但言四象以示不言五象也今揲蓍之義以筮而尚占者也以象天地之用數所以大行之數減天地之數五也其用四十有九第十六論上大行之數五十其用四十有九韓氏注曰衍天地之數所賴者五十其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也四十有九數之極也夫無不可以無明必因於有固嘗於有物之極而必明其所由之宗也孔氏疏京房云五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虛求實故用四十九焉馬季長云易有太極謂北辰北辰生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九運而用之也荀爽云卦各有六爻六八四十八加乾坤二用凡五十初九潛龍勿用故用四十九也鄭康成云天地之數五十有五者以五行氣通於萬物故減五大衍又減一故用四十九姚董遇云天地之數五十有五者其六以象六之數故減而用四十九也顧歡云立此五十數以數神神雖非數因數而顯故虛其一數以明不可言之義也令詳諸家所釋義有多端雖各執其說而理則未允敢試論之韓氏注以虛一為太極則未詳其所出之宗也何者夫太極生兩儀兩儀既分天始生一肇其有數也而後生四象五行之數合而為五十有五此乃天地之極數也今若以太極為虛一之數則是大衍當用五十有四也不然則餘五之數無所設耳況乎大衍衍天地之數也則明乎後天地之數矣大衍既後天地之數則太極不可配虛其一之位也明矣又無不可以元明必因於有是則以太極為無之稱且太極者元氣混而為一之時也其氣已兆非無之謂則韓氏之注義亦迂矣或曰韓氏之注承輔嗣之旨且輔嗣之注獨冠古今斐然議之無乃不可乎答曰此必韓氏之寓言非輔嗣之意也且若愚以胸臆論之是謂狂簡今質以聖人辭且易有太極是生兩儀易既言有則非無之謂也不其然乎至于京荀馬鄭衆賢之論皆採撫天地名數强配其義且若以天地之名數强加配偶則靡所不可然而天地之數生成相因理如貫珠不可駢贅而設也雖能强立其義推而究之則於所由之宗不㑹矣試論於末篇論下天地之數十有五居其內而外斡五行之數四十也今止用其四十九者何也蓋由天五為變化之始散在五行之位故中無定象又天一居尊而不動以用天德也天德九也天一者象之始也有生之宗也為造化之主故居尊而不動也惟天三地二地四之數合而成九陽之數也天三則乾之三畫地二地四則坤之六畫也地道無成而代有終陽得兼隂之義也故乾之三兼坤之六成陽之九斡運五行成數而通變化也所以揲耆之義以象其數也或問曰易云坤元用六今則乾三兼之是坤之六無用乎答曰非也在其中矣此蓋易舉其多數而言之也數六是少數舉其多則少可知矣是知陽進而乾元用九陽退則坤元用六也亦由當期之日惟合老隂老陽之數其少隂少陽之數則在其中舉多兼少易義皆然矣少陽第十七少隂第十八老陽第十九老隂第二十七八九六合數第二十一且夫七八九六之數以四位合而數之故老陽四九則三十六也少陽四七則二十八也老隂四六則二十四也少隂四八則三十二也乾畫三位第二十二坤畫三位苐二十三範畫竒也坤畫偶也且乾坤之位分則竒偶之列則隂陽之位序矣陽中隂第二十四隂中陽第二十五乾獨陽第二十六坤獨陰第二十七經曰一隂一陽之謂道韓氏注云道者無之稱無不通也無不由也況之曰道寂然無體不可為豕必有之用極而無之功顯故至于神無方而易無體而道可見矣故窮變以盡神因神而明道隂陽雖殊無一以待之在隂為無隂隂以之生在陽為無辭陽以之成故曰一隂一陽也又孔氏云一謂無隂無陽乃謂之道也觀其注疏之家祖述無以為義不釋其道之妙用也且道無形亦必陳乎宗旨易稱一隂一陽之謂道必垂一隂一陽之義耳略試論之且夫一隂一陽者獨隂獨陽之謂也獨隂獨陽且不能生物必俟一隂一陽合然後運其妙用而成變化四象因之而有萬物由之而生故曰無不由之謂道也若夫獨隂獨陽者天地所禀天獨陽地獨隂至于五行之物則各含一隂一陽之氣而生也所以天一與地六合而生水地二與天七合而生火天三與地八合而生木地四與天九合而生金天五與地十合而生土此則五行之質各禀一隂一陽之氣耳至于動物植物又合五行之氣而生也今欲明其義故先布天地獨隂獨陽之體次列五行含二氣之象末陳人禀五行之質也離為火第二十八坎為水第二十九震為木第三十允為金苐三十一天五合地十為土第三十二土無象也分王四季地則積隂之氣氣稟獨隂不能生物也暨天五與地十合而生土成其形質附地而載是為五行之一也故疏云土者是地中之則耳所以地則稱乎獨隂土則禀乎二氣也人稟五行第三十三易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也然則三才之道上中下之位三才之用舍五行則斯須無以濟矣至于人之生也外濟五行之利內具五行之性五行者木火土金水也木性仁火性禮土性信金性義水性智是故圓首方足最靈於天地之間者藴是性也人雖至愚其於外也日知由五行之用其於內也或蒙其性而不循五常之教者可不哀哉易數鈎隱圖卷上
