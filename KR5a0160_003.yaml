front:
  text: 易數鈎隱圓卷下雲三
  hash: sha256:daaccb0ec70dbbbfd0fd0206c7ae48bd0e166fcf552843f89f72da9798400c1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0160_HFL_003-001a, image: hfl/0071/0071-084.png}
body:
  text: 河圖第四十九以五為主六八為膝二四為肩左三右七戴九履一河圖天地數第五十河圖四象第五十一河圖八卦第五十二洛書五行生數第五十三洛書五行成數第五十四或問曰洛書云一曰水二曰火三曰木四曰金五曰土則與龍圖五行之數之位不偶者何也答曰此謂陳其生數也且雖則陳其生數乃是巳交之數也下篇分土王四時則備其成數矣且夫洛書九疇惟出於五行之數故先陳其巳交之生數然後以土數足之乃可見其成數也十日生五行并相生第五十五天一地六地二天七天三地八地四天九天五地十合而生水火木金土十日者剛日也相生者金生水水生木木生火火生土土生金也相尅者金尅木木尅土土尅水水尅火火尅金也龍圖龜書論上易曰河出圖洛出書聖人則之春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇書正義曰洛書九類各有文字即是書也而云天乃錫禹如此天與禹者即是洛書也漢五行志劉歆以為伏犧繫天而王河出圖則而畫八卦是也禹治洪水錫洛書法而陳洪範是也頴達共為此説龜負洛書經無其事中候及諸緯多説黃帝堯舜禹湯文武受圖書之事皆云龍負圖龜負書緯候之書不知誰著通人討核以為偽起哀平者也前漢之末始有此書不知起誰氏也以前學者必相傳此説故孔氏以九類是神龜負文而出列於背有數從一而至於九見其文遂因而第之以九類也陳而行之所以常道得其次敘也言禹第之者以天神言語必當簡要不應曲有次第丁寧若此故以禹次而第之也然大禹既得九類常道始有次敘未有洛書之前帝道所以不亂者世有澆淳教有踈密三皇以前無文亦治何止無洛書也但既得九類以後法而行之則治違之則亂也且不知洛書本文計天言簡要必無次第之數上傳云禹因而次之則孔氏以第是禹之所為初一曰等二十八字必是禹加之也其敬用農用等一十八字大劉及顧氏以為龜負也小劉以為敬用等亦禹所第敘其龜文惟有二十字並無明據未知孰是故兩存焉耳詳夫衆賢之論多背經書之旨觀其大法凡九類蓋是禹敘洛書因而第之遂著成法則非是神龜負書出於大禹之時也何以明其然略試論之箕子曰在昔鯀堙洪水汩陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘則不載神龜負圖之事惟孔氏注稱天與禹洛書神龜負文而出列於背有數至九也諸儒更演載天書言語字數之説後乃迹相祖述遂以禹親受洛書而陳九類且經無載圖書之事惟易繫辭云河出圖洛出書聖人則之此蓋仲尼以作易而云也則知河圖洛書出於犧皇之世矣乃是古者河出龍圖洛出龜書犧皇畫八卦因而重之為六十四卦文王作卦辭周公作爻辭仲尼輔之十翼易道始明觀今龍圖其位有九四象八卦皆所包韞且其圖縱橫皆合天地自然之數則非後人能假偽而設之也夫龍圖呈卦非聖人不能書之卦含萬象非聖人不能明之以此而觀則洛出書非出大禹之時也書云天錫禹九疇者蓋是天生聖德於禹誠明洛書之義因第而次之垂範後世也今河圖相傳於前代其數自一至九包四象八卦之義而兼五行之數洛書則惟五行生成之數也然犧皇但畫卦以垂教則五行之數未顯故禹更陳五行而顯九類也今諸儒以禹受洛書書載天神言語陳列字數實非通論天何言哉聖人則之必不然也或曰未可敢質于經且堯任九子各主其一九疇之數九子之職也至農用八政司空司徒之官唐虞世設之矣協用五紀羲氏和氏巳正之矣斯則非俟禹受洛書之後設其官也且夫天垂象見吉凶聖人象之河出圖洛出書聖人則之天象則雖韞其義非至聖不能明之河圖洛書非羲皇不能畫之卦合其象非文王不能伸之爻象之興非周公不能著之故仲尼曰文王既沒文不在茲乎又曰天生德於豫則知天生睿哲於聖人默究乎幽賾是謂錫之也故仲虺之誥曰天乃錫王勇智表正萬邦之謂也且孔氏以箕子稱天乃錫禹九疇便謂之洛出龜書則不思聖人云河出圖洛出書在作易之前也又唐法九疇唐虞之前巳行之矣而云禹受洛書之從始有常道次敘不曰誣之者乎論下春秋緯曰洛書六篇孔氏云洛書神龜負文而出列于背有數一至九今代之所傳龜書惟總五行生成之數未知孰是略試論之春秋緯言洛書六篇則與五行九疇之數不偶亦未明其義孔氏云洛書有數一至九謂書之九疇自一五行至五福六極之數也且書之九疇惟五行是包天地自然之數餘八法皆是禹參酌天時人事類之耳則非龜所負之文也令詳洪範五行傳凡言災異必推五行為之宗又若鯀無聖德汩陳五行是以彛倫攸斁則知五行是天垂自然之數其文負于神龜餘八法皆大禹引而伸之猶龍圖止負四象八純之卦餘重卦六十四皆伏犧仰觀俯察象其物宜伸之以爻象也況乎五行包自然之性八卦韞自然之象聖人更為之變易各以類分而觀吉凶矣若今世之所傳者龜書不為妄也尚或疑焉者試精之于問答或問曰且云圖書皆出於犧皇之世則九疇亦陳于犧皇之代不當言禹第而次之也答曰河圖八卦垂其象也故可以盡陳其位洛書五行含其性也必以文字分其類宓犧之世世質民淳文字未作故九疇莫得而傳也但申其數耳至大禹聖人遂演成九類垂為世範九疇自禹而始也或問曰既云龍圖兼五行則五行巳具於龍圖矣不應更用龜書也答曰雖兼五行有中位而無土數唯四十有五是有其象而未著其形也唯四象八卦之義耳龜書乃具五行生成之數五十有五矣易者包象與器故聖人資圖書而作之也或問曰書云天乃錫禹洪範九疇必洛書今臆説破之無乃答曰仲尼稱河出圖洛出書於宓犧畫易之前不當云出夏禹之世也如曰不然是洛書復出于夏禹之時矣誠如是禹之前無九疇也又何以堯之典九法坦然明白乎哉問曰今書世之傳者龍圖龜書經所不載緯候之書蔑聞其義誠誕説也曰龍圖龜書雖不載之于經亦前賢迭相傳授也然而數與象合位將卦偶不盈不縮符于自然非人智所能設之也況乎古今隂陽之書靡不宗之至于通神明之德與天地之理應如影響豈曰妄乎易數鈎隱圖卷下
