front:
  text: 易數鈎隱圖卷中雲二
  hash: sha256:3b026401d57ae2f7776e024b26d1431e1044174f07af3d976fdb6d76519dfb27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0160_SJB_002-030208b, image: sjb/03/030208b.png}
body:
  text: 乾坤生六子第三十四乾下交坤第三十五乾天也故稱乎父下濟而光明焉坤上交乾第三十六坤地也故稱乎母卑而上行焉震爲長男第三十七震一索而得男故謂之長男巽爲長女第三十八巽一索而得女故謂之長女坎爲中男第三十九坎再索而得男故謂之中男離爲中女第四十離再索而得女故謂之中女艮爲少男第四十一艮三索而得男故謂之少男兊爲步女第四十二兊三索而得女故謂之少女巳上更布自然之象者蓋欲明上下自然交易相生之理成八卦變化之義也坎生復卦第四十三離生姤卦第四十四夫易有太極是生兩儀兩儀生四象四象生八卦八卦成列象在其中矣因而重之爻在其中矣則知太極乃兩儀之始八卦則重卦之始也重卦之首以復卦何謂也陽炁之始也略試論之且夫四正之卦所以分四時十二月之位兼乾坤艮震者所以通其變化因而重之所以效其變化之用也觀其變化之道義有所宗故其復卦生于坎中動于震上交於坤變二震二兊二乾而終自復至乾之六月斯則陽爻上生之義也姤卦生於離中消於巽下交於乾變二巽二艮二坤而終自姤至于坤之六月斯則險爻下生之義也自復至坤凡十二卦主十二月卦主十二月中分二十四炁爻分七十二候以周其月日之數是故離坎分天地子午以東爲陽子午以西爲隂若夫更錯以他卦之象則緫三百八十四爻所以極三才之道或問曰合數圖以正之卦之與爻分四時十二月之位又兼乾坤艮巽之卦通其變且復卦生坎中動于震交于坤易曰地中有雷復正恊其義也若姤卦則生於離之中消於巽交於乾易曰天下有風姤且巽非四正之卦也則與復卦不同其義今卦體則是巽承於乾而變易其位從兊者何謂也答曰斯則取歸妹之象易曰歸妹天地之大義也天地不交則萬物不興歸妹者人之終始也所以資長男交少女之義交少女而長女主其卦者明其妺係於姊嫁而妹非正也所謂姪娣之義也若以長男交長女雖曰夫婦常乆之道然未盡廣延之理也則知能終其始者必歸妹也故易稱天地之大義是以卦之變易必從歸妹妹非正室必以姊主其卦也是以其體則取兌合震其名則以巽承乾也變易之義其在茲乎三才第四十五願缺前賢釋三才之義皆以設剛柔兩畫以布二炁布以三位而象三才謂聖人率意以畫之矣斯亦不詳繫辭之義也夫卦者天垂自然之象也聖人始得之於河圖洛書遂觀天地竒偶之數從而書之是成八卦則非率意以畫其數也略試論之夫三盡所以成卦者取天地自然竒偶之數也乾之三畫而分三位者爲天之竒數三故書三位也地之偶数三亦畫三位也餘六卦者皆乾坤之子其體則一故亦三位之設耳且夫天獨陽也地獨隂也在獨陽獨隂則不能生物暨天地之炁五行之數定始能生乎動植故經曰有天地然後萬物生焉豈一炁之中有藴三才之道邪所謂兼三才而兩之盖聖人重卦之義也非八純卦之謂也三才則天地人之謂也兩之則重之謂也上二畫爲天中二畫爲人下二畫爲地以人合天地之炁生故分天地之炁而居中也所以九二稱在田明地道也九五稱飛龍在天明天道也斯則其理坦然而明白矣如曰不然敢質之於繫辭曰六爻之動三極之道也又曰有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也又曰昔者聖人之作易將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦斯則皆云六畫包三才之義則無三畫韞三才之說不其然乎若夫六爻皆有人事者爲人倫則天法地之象故初上皆包人事之義耳七日來復第四十六論凡三篇論上正義曰陽炁始剥盡謂陽炁始於剥盡之後至陽炁來復時凡七日也其釋注分明如禇氏莊氏並云五月一險生至十一月一陽生凡七月而云七日不云月者欲見陽長須速故變月而言日也今輔嗣云剥盡至來復是從剥盡至來復時經七日也若從五月書之何得云始盡也又臨卦亦是陽長言八月令復卦亦是陽長何獨變月而稱日觀注之意必爲不然亦用易緯六日七分之義同鄭康成之說但於文省略不復具言按易緯稽覽圖云卦炁起於艮巽離坎震兊各主一方其六十卦卦有三百六十爻日凡主三百六十日餘有五日四分日之一毎日分爲八十分五日分爲四百分四分日之一又爲二十分是四百二十分六十卦分之六七四十二各得七分是毎卦得六日七分也剥卦陽炁之盡在九月之末十月當純坤用事坤卦在六日七分之前從剥盡至陽炁來復隔坤之一卦六日七分舉成數言之故輔嗣言凡七日也且今七日來復之義詳夫孔氏之䟽雖得之於前而又失之於後也何哉且易云七日來復輔嗣之注又言七日雖則引經注破褚氏莊氏之誤於義爲得末又引易緯鄭氏六日七分則其理又背經注之義且易緯鄭氏言毎卦得六日七分則未詳六日七分能終一卦之義略試論之且坎離震兊四正之卦也存四位生乾坤艮異之卦毎位統一時毎爻主一月此則四純之卦也又若重卦自復至乾六爻而經六月也自姤至坤亦六爻而經六月也則一爻而主一月也昭昭矣而云六日七分爲義則作䟽者不思之甚也且夫七日來復者十月之末坤卦旣終隂已退陽炁復生也爲天有十日陽上生也至七爲少陽險陽交易而生當陽復來之時爲老隂待經險之數盡至七日少陽七日來復則合經注之義也論中繁辭曰天一地二天三地四天五地六天七地八天九地十此乃五行生成之數也天一生水地二生火天三生木地四生金天五生土此其生數也如此則陽無匹隂無偶故地六成水天七成火地八成木天九成金地十成土於是隂陽各有匹偶而物得成矣故謂之成數也又曰天數五地數五五位相得而各有合此所以成變化而行鬼神謂此也又數之所起起於隂陽隂陽往來在於日道十一月冬至以及夏至當爲陽來正月爲春木位也日南極陽來而隂往冬水位也當以一陽生爲水數五月夏至日北極隂進而陽退夏火位也當以一險生爲火數但隂不名竒數必六月二隂生爲火數也是故易稱乾貞於十一月坤貞於六月來而皆左行由此冬至以及夏至當爲陽來也正月爲春木位也三陽巳生故三爲木數夏至以及於冬至爲隂進八月爲秋金位也四隂以生故四爲金數三月春之季土位五隂以生故五爲土數此其也又萬物之本有生於无著生於㣲萬物成形必以㣲著爲漸五行先後亦以㣲著爲次五行之體水最㣲爲一火漸著爲二木形實爲三金體固爲四土質大爲五亦是次序之宜矣劉氏與顧氏皆以爲水火木金得土數而成故水數成六火數成七木數成八金數成九土數成十義亦然也今詳衆賢之論以天一至天五爲五行之生數則不釋所以能生之之義也以地六至地十爲五行之成數則不釋所以能成之之義也故學者莫洞其旨蓋由象興形不析有无之義也道與器未分上下之理也略試論之易曰形而上者謂之道形而下者謂之器則地六而上謂之道地六而下謂之器也謂天一地二天三地四止有四象未著乎形體故曰形而上者謂之道也天五運乎變化上駕天一下生地六水之數也下駕地二上生天七火之數也右駕天三左生地八木之數也左駕地四右生天九金之數也地十應五而居中土之數也此則巳著乎形數故曰形而下者之謂器所謂象之與形者易云見乃謂之象河圖所以示其象也形乃謂之器洛書所以陳其形也本乎天者親上本乎地者親下故曰河以通乾岀天洛以流坤吐地易者韞道與器所以聖人兼之而作易經云河出圖洛出書聖人則之斯之謂矣且夫河圖之數惟四十有五蓋不言土數也不顯土數者以河圖陳八卦之象若其土數則入乎形數矣是兼其用而不顯其成數也洛書則五十五數所以成變化而著形器者也故河圖陳四象而不言五行洛書演五行而不述四象然則四象亦金木水火之成數也在河圖則老陽老隂少陽少隂之數是也在洛書則金木水火之數也所以異者由四象附土數而成質故四象異於五行矣然而皆從天五而變化也至于天數五地數五五位相得而各有合焉者此備陳五行相生之數耳且五行雖有成數末各相合則亦未有所從而生矣故天一與地六合而生水地二與天七合而生火天三與地八合而生木地四與天九合而生金天五與地十合而生土伏犧而下但乗其數至黃帝始名原缺乙丙丁也仐衆賢以一陽生爲水數二隂生爲火數三陽生爲木數四隂生爲金數五陽生爲土數原鈌說强配之也則非天地自然之數也至于以㣲著爲漸者亦非通論何哉且以堅固言之則土不當復於金也以廣太言之則火不當後於水也蓋五行之質各禀自然偶合而生相因於數㣲著之論實非經㫖矣又若十一月一陽生爲竒數者謂天一動乎坎之中也五月一隂生爲偶數者謂地二動乎離之中也以六月二隂生爲偶數則未知所出之宗也論下詳夫易緯稽覽圖及鄭六日七分之說蓋取乾坤老陽老隂之䇿配之也經曰乾之䇿二百一十有六坤之䇿百四十有四凡三百六十當期之日䟽云舉其大略則不數五日四分之一也又䟽云二篇之爻緫三百八十四隂陽各半焉陽爻一百九十二位爻别三十六緫有六千九百一十二也隂爻一百九十二位爻别二十四緫有四千六百八也隂陽緫合萬有一千五百二十當萬物之數也且經爲乾坤二卦老陽老隂三百六十之數當期之日則不更別起數矣卦之與爻則未詳易緯鄭氏六日七分之義也夫隂陽之爻緫有三百八十四焉且易緯及鄭氏雖以坎離震兊四正之卦之爻減乎二十四之數與當期之日相契則又與聖人之辭不同矣何以知之且夫起子止亥十二月之數所以主十二卦之爻也十二卦之爻者自復至坤之位也豈可取雜書賢人之說而破聖人之經義哉或曰不然其如繫辭何臨卦八月第四十七遯卦第四十八臨至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不乆原缺諸家之注解各有異焉且何氏云從建子生至建未爲八月褚氏云自建寅至建酉爲八月孔氏䟽又曰今按此注云小人道長君子道消宜據否卦之時以臨卦建丑而至否卦則建申爲八月也理有未安略試論之粤若諸家之說皆與臨卦之義不相偶與何以知之且卦彖之辭所以各論一卦之體也夫臨卦者主建丑之月也何氏從建子陽生而數則卦辭當在復卦之下不當屬臨卦也禇氏從寅而數則卦辭當在泰卦之下亦不當屬臨卦也孔氏宜據建申否卦爲八月則否之六三當消泰之九三又與臨卦九三之不應也今若以建未爲八月取遯卦之六二消臨卦之九二則於義爲允矣何者且臨卦之彖曰浸而長注云陽道轉進隂道日消也遯卦之彖亦曰浸而長注云隂道欲進而長正道亦未全滅也今以二卦之爻旣相偶合又彖辭皆有隂陽浸長之說則其義不得不然也所以稱建未爲八月耳或問當文王演卦之時乃商之末世也豈正月爲義哉答曰周公作爻辭父基子構所以爻辭多文王後事則知文王之㫖周公述而成之故以周正爲定況乎易有二名夏曰連山商曰歸藏周曰周易連山則神農氏之號也歸藏則軒轅氏之號也旣連山歸藏並是代號所以題周以别餘代亦由周禮之謂也且易旣題周以正名則公不得不以周之正朔定其月也孰謂不然若何氏以建子至建未爲八月則是究其末而不原其本矣至于孔氏引輔嗣之注以君丁道消小人道長必以否卦之義也但隂則小人之道長陽則君子之道長不必專在否卦之義也明矣又王氏卦略云遯小人浸長難在於内亨在於外與臨卦相對者也臨剛長則柔危遯柔長則剛危矣臨二陽居内君子之道日長遯二險在内小人之道日進且八月凶者天之道火寒暑退陽長至二得位居中故於此時垂消退之戒陽息於十一月爲復至十二月爲臨消於五月爲姤至六月爲遯自子至未凡八月也易數鈎隱圖卷中
